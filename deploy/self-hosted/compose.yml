# ---------------------------------------------------------------------------
# LibreChat self-hosted deploy compose.
#
# Bring up with:
#
#   docker login registry.acceled.net
#   cp deploy.env.example .env
#   cp librechat.self-hosted.yaml librechat.yaml
#   docker compose -f compose.yml up -d
#
# To deploy from another registry, set:
#
#   LIBRECHAT_API_IMAGE=registry.example.com/team/name/librechat-api
#   LIBRECHAT_API_IMAGE_TAG=main
#
# registry.acceled.net is also used as the default mirror prefix for public
# dependency images to speed up pulls.
#
# The API image contains the built client bundle. Caddy is kept as the public
# entrypoint for HTTP/HTTPS and reverse proxies requests to the API container.
# ---------------------------------------------------------------------------
name: librechat

x-librechat-api-env: &librechat-api-env
  HOST: 0.0.0.0
  NODE_ENV: production
  MONGO_URI: mongodb://mongodb:27017/LibreChat
  MEILI_HOST: http://meilisearch:7700
  RAG_PORT: ${RAG_PORT:-8000}
  RAG_API_URL: http://rag_api:${RAG_PORT:-8000}
  PROXY: ${PROXY:-}
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1},${no_proxy:-},mongodb,chat-mongodb,meilisearch,chat-meilisearch,rag_api,vectordb,host.docker.internal
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-localhost,127.0.0.1,::1},${NO_PROXY:-},mongodb,chat-mongodb,meilisearch,chat-meilisearch,rag_api,vectordb,host.docker.internal
  ADMIN_PANEL_URL: ${ADMIN_PANEL_URL:-http://admin.localhost}

services:
  api:
    image: ${LIBRECHAT_API_IMAGE:-registry.acceled.net/team/max/librechat-api}:${LIBRECHAT_API_IMAGE_TAG:-main}
    container_name: LibreChat-API
    pull_policy: always
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_started
      rag_api:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${LIBRECHAT_ENV_FILE:-.env}
    environment:
      <<: *librechat-api-env
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs
      - ./skill:/app/skill

  admin-panel:
    image: ${ADMIN_PANEL_IMAGE:-registry.acceled.net/team/max/librechat-admin-panel:latest}
    container_name: admin-panel
    pull_policy: always
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    environment:
      PORT: 3000
      SESSION_SECRET: ${ADMIN_PANEL_SESSION_SECRET:-${CREDS_KEY}}
      API_SERVER_URL: http://api:3080
      VITE_API_BASE_URL: ${DOMAIN_CLIENT:-http://localhost}
      SESSION_COOKIE_SECURE: ${ADMIN_PANEL_SESSION_COOKIE_SECURE:-false}

  client:
    image: ${CADDY_IMAGE:-registry.acceled.net/caddy:2-alpine}
    container_name: LibreChat-Caddy
    depends_on:
      api:
        condition: service_started
      admin-panel:
        condition: service_started
    restart: unless-stopped
    environment:
      LIBRECHAT_SITE_ADDRESS: ${LIBRECHAT_SITE_ADDRESS:-http://localhost}
      LIBRECHAT_ADMIN_ADDRESS: ${LIBRECHAT_ADMIN_ADDRESS:-http://admin.localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  mongodb:
    image: ${MONGO_IMAGE:-registry.acceled.net/mongo:8.0.20}
    container_name: chat-mongodb
    restart: unless-stopped
    command: mongod --noauth
    volumes:
      - ./data-node:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  meilisearch:
    image: ${MEILI_IMAGE:-registry.acceled.net/getmeili/meilisearch:v1.35.1}
    container_name: chat-meilisearch
    restart: unless-stopped
    env_file:
      - ${LIBRECHAT_ENV_FILE:-.env}
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - ./meili_data_v1.35.1:/meili_data

  vectordb:
    image: ${VECTORDB_IMAGE:-registry.acceled.net/pgvector/pgvector:0.8.0-pg15-trixie}
    container_name: vectordb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RAG_POSTGRES_DB:-mydatabase}
      POSTGRES_USER: ${RAG_POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${RAG_POSTGRES_PASSWORD:-mypassword}
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_POSTGRES_USER:-myuser} -d ${RAG_POSTGRES_DB:-mydatabase}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  rag_api:
    image: ${RAG_API_IMAGE:-registry.acceled.net/team/max/librechat-rag-api-dev-lite:latest}
    container_name: rag_api
    pull_policy: always
    restart: unless-stopped
    depends_on:
      vectordb:
        condition: service_healthy
    env_file:
      - ${LIBRECHAT_ENV_FILE:-.env}
    environment:
      DB_HOST: vectordb
      RAG_PORT: ${RAG_PORT:-8000}

volumes:
  caddy_data:
  caddy_config:
  pgdata2:

networks:
  default:
    name: librechat
